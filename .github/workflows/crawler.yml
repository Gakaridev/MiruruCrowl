name: ParkruleCrawler

on:
  schedule:
    - cron: "0 */6 * * *" # 6時間ごと
  workflow_dispatch: # 手動実行OK

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      # リポジトリ取得
      - name: Checkout
        uses: actions/checkout@v4

      # Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 依存インストール
      - name: Install dependencies
        run: npm install

      # クロール実行（ここでSupabase保存までやる）
      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node crawler.js
